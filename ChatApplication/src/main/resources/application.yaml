spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ChatApplication
  data:
    mongodb:
      # IMPORTANT: Set MONGO_URI environment variable!
      # Examples:
      #   Local: mongodb://localhost:27017/chatdb
      #   Cloud (Atlas): mongodb+srv://user:pass@cluster.mongodb.net/chatdb?retryWrites=true&w=majority
      # On Render: Set in Environment section of your service dashboard
      uri: ${MONGO_URI:mongodb://NOT_CONFIGURED}
      auto-index-creation: false
groq:
  chat:
    apiurl: ${GROQ_API_URL:}
    apikey: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:}
    max-tokens: ${GROQ_MAX_TOKENS:}

